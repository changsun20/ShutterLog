name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-musl-x64
            artifact: ShutterLog-linux-x64

          - os: windows-latest
            rid: win-x64
            artifact: ShutterLog-win-x64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        if: matrix.os == 'windows-latest'
        with:
          dotnet-version: '10.0.x'

      - name: Publish (Linux musl static)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -w /src \
            mcr.microsoft.com/dotnet/sdk:10.0-alpine-aot \
            sh -c 'dotnet publish ShutterLog/ShutterLog.csproj \
              -c Release \
              -r linux-musl-x64 \
              -o publish \
              -p:StaticExecutable=true'

      - name: Publish (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dotnet publish ShutterLog/ShutterLog.csproj -c Release -r win-x64 -o publish

      - name: Rename artifact
        shell: bash
        run: cp publish/ShutterLog${{ matrix.rid == 'win-x64' && '.exe' || '' }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Show artifacts
        run: find . -type f

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ShutterLog-linux-x64/ShutterLog-linux-x64
            ShutterLog-win-x64.exe/ShutterLog-win-x64.exe
          generate_release_notes: true
